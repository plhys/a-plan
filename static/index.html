<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#059669">
    <title data-i18n="header.title">A计划 - 管理控制台</title>
    <link rel="stylesheet" href="app/base.css?v=5.0.0">
    <link rel="stylesheet" href="app/mobile.css?v=5.0.0">
    <link rel="stylesheet" href="components/section-custom-models.css?v=5.0.0">
    <!-- 极客加固：强制加载全球通用 FontAwesome -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div id="sidebar-container"></div>
            <main class="content" role="main" id="content-container"></main>
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script type="module" src="app/i18n.js?v=5.0.0"></script>
    <script type="module" src="app/language-switcher.js?v=5.0.0"></script>
    <script type="module" src="app/theme-switcher.js?v=5.0.0"></script>
    <script type="module" src="app/auth.js?v=5.0.0"></script>
    <script type="module" src="app/models-manager.js?v=5.0.0"></script>
    <script type="module" src="app/app.js?v=5.0.0"></script>
    <script type="module">
        import { initApp } from './app/app.js';
        import { initializeComponents } from './app/component-loader.js';
        import { initI18n, setLanguage, getCurrentLanguage } from './app/i18n.js';
        import { initLanguageSwitcher } from './app/language-switcher.js';
        import { initThemeSwitcher, setTheme, getCurrentTheme } from './app/theme-switcher.js';
        import { initAuth, logout } from './app/auth.js';
        
        setTheme(getCurrentTheme());
        
        (async function() {
            try {
                if (await initAuth()) {
                    // 1. 异步加载 UI 组件片段
                    await initializeComponents();
                    
                    // 2. 核心逻辑初始化（绑定事件监听器）
                    initApp();
                    
                    // 3. 翻译与多语言初始化
                    initThemeSwitcher();
                    initI18n();
                    initLanguageSwitcher();
                    setLanguage(getCurrentLanguage());
                    console.log('A-Plan v4.2.7 Geek Edition Initialized');
                }
            } catch (err) {
                console.error('UI Initialization Failure:', err);
            }
        })();
        
        // 项目信息弹窗
        window.showAbout = async function() {
            let currentVersion = '5.0.0';
            try {
                const resp = await fetch('/api/system');
                const data = await resp.json();
                if (data.appVersion) currentVersion = data.appVersion;
            } catch (e) {}

            const aboutHtml = `
                <div style="padding: 20px; max-width: 600px; line-height: 1.8;">
                    <h2>📡 A计划 V${currentVersion}</h2>
                    <p><strong>用途：</strong>AI 接口网关，统一管理多模型提供商</p>
                    <p><strong>特性：</strong></p>
                    <ul style="margin-left: 20px;">
                        <li>极速 LITE 模式 - 毫秒级启动</li>
                        <li>插件市场 - 按需安装功能</li>
                        <li>高可用守护 - 自动故障恢复</li>
                        <li>Git 云同步 - 配置自动备份</li>
                    </ul>
                    <p><strong>部署环境：</strong></p>
                    <ul style="margin-left: 20px;">
                        <li>Pod 持久化目录：/home/skywork/workspace/a-plan</li>
                        <li>启动命令：npm start 或 node src/core/master.js</li>
                        <li>默认端口：18781</li>
                    </ul>
                    <p><strong>维护者：</strong>plhys (委员长)</p>
                    <p><strong>GitHub：</strong>github.com/plhys/a-plan</p>
                    <button onclick="document.getElementById('about-modal').remove()" style="margin-top:10px;padding:8px 20px;">关闭</button>
                </div>
            `;
            const modal = document.createElement('div');
            modal.id = 'about-modal';
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
            modal.innerHTML = aboutHtml;
            document.body.appendChild(modal);
        };
        
        // 页面加载后显示关于信息
        setTimeout(() => {
            if (localStorage.getItem('showAbout') !== 'false') {
                // window.showAbout();
                localStorage.setItem('showAbout', 'false');
            }
        }, 1000);
        
        window.logout = logout;
    </script>
</body>
</html>
